name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate package and example
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build package
        run: pnpm build

      - name: Build example app
        run: pnpm --filter next-hydration-silencer-example build

      - name: Install Playwright browser
        run: pnpm --filter next-hydration-silencer-example exec playwright install --with-deps chromium

      - name: Integration tests
        run: pnpm --filter next-hydration-silencer-example test:integration

      - name: Check package contents
        run: pnpm pack --dry-run
